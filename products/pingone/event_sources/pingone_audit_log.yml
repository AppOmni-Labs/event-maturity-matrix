entity_name: event_source
version: 0.0.1
product:
  name: PingOne
  collection_sources:
  - get_read_user_activities
name: Read User Activities API
description: The PingOne Read User Activities API provides near real-time, read-only access to an organization's audit activity
  events.
references:
- id: get_read_user_activities_documentation
  name: Read User Activities API Documentation
  url: https://apidocs.pingidentity.com/pingone/platform/v1/api/#get-read-user-activities
retention:
  duration: Unknown
  comments: N/A
latency:
  duration: Near real-time
  comments: N/A
licensing:
  comments: A PingOne license is required to access the Read User Activities API.
mappings:
- category: authentication
  event_type: account_login
  attributes:
    timestamp: recordedAt
    event_id: id
    event_code_or_type: action.type
    result: result.status
    username: actors.user.name
    user_id: actors.user.id
    session_id: correlationId
    ip_address: source.ipAddress
    user_agent_name: source.userAgent
  examples:
  - type: success
    location: ./event_examples/authentication_account_login_session_success.json
  - type: failure
    location: ./event_examples/authentication_account_login_session_failure.json
- category: authentication
  event_type: account_logout
