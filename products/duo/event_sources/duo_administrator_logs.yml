entity_name: event_source
version: 1.0.0
product:
  name: Duo
  collection_sources: [duo_admin_api]
name: Duo Administrator Logs
description: Provides an audit trail of administrative actions taken within the Duo
  Security platform.
references:
  - id: duo_administrator_logs
    name: Duo Administrator Logs
    url: https://duo.com/docs/adminapi#administrator-logs
retention:
  duration: Configurable
  comments: Administrator logs are stored based on the log retention interval setting.
    If no custom log retention interval has been specified, Administrator logs can
    be retrieved from the time the account was initially created, reference https://help.duo.com/s/article/2990?language=en_US
latency:
  duration: Near real-time
  comments: N/A
licensing:
  comments: The Duo Admin API is available to Duo Premier, Duo Advantage, and Duo
    Essentials customers, and new customers with an Advantage or Premier trial. For
    more information, see https://duo.com/docs/adminapi#about-the-admin-api
mapping_defaults:
  categories:
    authorization:
      attributes:
        timestamp: [isotimestamp, timestamp]
        event_code_or_type: action
        username: username
    system_audit:
      attributes:
        timestamp: [isotimestamp, timestamp]
        event_code_or_type: action
        username: username
    activity_audit:
      attributes:
        timestamp: [isotimestamp, timestamp]
        event_code_or_type: action
        username: username
mappings:
  - category: authentication
    event_type: account_login
    attributes:
      timestamp: [isotimestamp, timestamp]
      event_code_or_type: action
      result: action
      username: [username, description.email]
      user_type_or_role: description.role
      ip_address: description.ip_address
      device_client_type: description.device
      failure_context: description.error
      credential_context:
        - description.factor
        - description.primary_auth_method
        - EMM_UPDATE
    examples:
      - type: success
        location: ./event_examples/authentication_account_login_success_admin.json
      - type: failure
        location: ./event_examples/authentication_account_login_failure_admin.json
  - category: authentication
    event_type: mfa_verification
    attributes:
      timestamp: [isotimestamp, timestamp]
      event_code_or_type: action
      result: [action, error]
      username: [username, description.email]
      ip_address: description.ip_address
      verification_method: description.factor
      verification_flagged: description.error
    examples:
      - type: failure
        location: ./event_examples/authentication_mfa_verification_failure_admin.json
      - type: flagged
        location: ./event_examples/authentication_mfa_verification_failure_flagged_admin.json
  - category: authorization
    event_type: create_user
    attributes:
      user_type_or_role: description.role
      target_username: [description.uname, object]
    examples:
      - type: user
        location: ./event_examples/authorization_create_user_admin.json
      - type: admin
        location: ./event_examples/authorization_create_user_admin_admin.json
  - category: authorization
    event_type: update_user
    attributes:
      target_username: object
      target_attribute_context: description
    examples:
      - type: user
        location: ./event_examples/authorization_update_user_admin.json
      - type: admin
        location: ./event_examples/authorization_update_user_admin_admin.json
  - category: authorization
    event_type: delete_user
    attributes:
      user_type_or_role: description.role
      target_username: object
    examples:
      - type: user
        location: ./event_examples/authorization_delete_user_admin.json
      - type: admin
        location: ./event_examples/authorization_delete_user_admin_admin.json
  - category: authorization
    event_type: create_group
    attributes:
      target_group_name: [description.name, object]
    examples:
      - type: success
        location: ./event_examples/authorization_create_group_admin.json
  - category: authorization
    event_type: update_group
    attributes:
      target_group_name: object
      target_attribute_context: description
    examples:
      - type: success
        location: ./event_examples/authorization_update_group_admin.json
  - category: authorization
    event_type: delete_group
    attributes:
      target_group_name: [object, description.name]
    examples:
      - type: success
        location: ./event_examples/authorization_delete_group_admin.json
  - category: authorization
    event_type: add_to_group
    attributes:
      target_group_name: description.groups.name
      target_username: object
    examples:
      - type: success
        location: ./event_examples/authorization_add_to_group_admin.json
  - category: authorization
    event_type: remove_from_group
    attributes:
      target_username: object
    examples:
      - type: success
        location: ./event_examples/authorization_remove_from_group_admin.json
  - category: authorization
    event_type: add_enrollment
    attributes:
      user_agent_name: description.user_agent
      enrollment_type: description.authenticator_type
      target_username: description.owner_name
    examples:
      - type: success
        location: ./event_examples/authorization_add_enrollment_admin.json
  - category: authorization
    event_type: remove_enrollment
    attributes:
      enrollment_type: description
      target_username: object
    examples:
      - type: user
        location: ./event_examples/authorization_remove_enrollment_admin.json
      - type: admin
        location: ./event_examples/authorization_remove_enrollment_admin_admin.json
  - category: system_audit
    event_type: create_security_configuration
    attributes:
      configuration_setting_name: action
    examples:
      - type: success
        location: ./event_examples/system_audit_create_security_configuration_admin.json
  - category: system_audit
    event_type: update_security_configuration
    attributes:
      configuration_setting_name: [action, description]
      configuration_setting_value: description
    examples:
      - type: success
        location: ./event_examples/system_audit_update_security_configuration_admin.json
  - category: system_audit
    event_type: delete_security_configuration
    attributes:
      configuration_setting_name: [action, description, object]
      configuration_setting_value: description
    examples:
      - type: success
        location: ./event_examples/system_audit_delete_security_configuration_admin.json
  - category: system_audit
    event_type: create_integration
    attributes:
      timestamp: isotimestamp
      username: username
      integration_app_name: [description.name, object]
    examples:
      - type: success
        location: ./event_examples/system_audit_create_integration_admin.json
  - category: system_audit
    event_type: update_integration
    attributes:
      timestamp: isotimestamp
      username: username
      integration_app_name: object
      configuration_setting_name: description
    examples:
      - type: success
        location: ./event_examples/system_audit_update_integration_admin.json
  - category: system_audit
    event_type: delete_integration
    attributes:
      timestamp: isotimestamp
      username: username
      integration_app_name: [description.name, object]
    examples:
      - type: success
        location: ./event_examples/system_audit_delete_integration_admin.json
  - category: activity_audit
    event_type: create_resource
    attributes:
      resource_name: object
      resource_type: [action, description]
    examples:
      - type: success
        location: ./event_examples/activity_audit_create_resource_admin.json
  - category: activity_audit
    event_type: update_resource
    attributes:
      resource_name: [action, description]
      resource_type: [action, description]
    examples:
      - type: success
        location: ./event_examples/activity_audit_update_resource_admin.json
  - category: activity_audit
    event_type: delete_resource
    attributes:
      resource_name: object
      resource_type: [action, description]
    examples:
      - type: success
        location: ./event_examples/activity_audit_delete_resource_admin.json
