entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources:
  - rest_api
  - soap_api
name: EventLogFile Unique Query Event Type
description: Tracks normalized SOQL query patterns (unique query keys) for performance and security analysis.
references:
- id: unique_query_event
  name: EventLogFile Unique Query Event
  url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_eventlogfile_unique_query_event_elf.htm
retention:
  duration: 1 Day
  comments: Available for free with 1 day retention, otherwise requires an add-on subscription for 30 day retention.
latency:
  duration: 3 Hours
  comments: Event log files are accessible via hourly and 24 hour log files. It can take between 3–6 hours from the time of
    the event to be available in the hourly log file.
licensing:
  comments: Available for free with 1 day retention, otherwise requires Salesforce Shield or a Salesforce Event Monitoring
    add-on subscription.
mappings:
- category: activity_audit
  event_type: query_resource
  attributes:
    timestamp: TIMESTAMP_DERIVED
    event_code_or_type: EVENT_TYPE
    user_id: USER_ID
    session_id: SESSION_KEY
    query_string: QUERY_IDENTIFIER
  examples:
  - type: success
    location: ./event_examples/salesforce_elf_unique_query_event/activity_audit_query_resource_elf_uniquequery.json
