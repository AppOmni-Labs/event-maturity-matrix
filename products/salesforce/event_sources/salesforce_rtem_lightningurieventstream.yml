entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources: [streaming_api]
name: Real-Time Event Monitoring LightningUriEventStream
description: Detects when a user creates, accesses, updates, or deletes a record in
  Lightning Experience only.
references:
  - id: lightning_uri_event_stream
    name: LightningUriEventStream
    url: https://developer.salesforce.com/docs/atlas.en-us.platform_events.meta/platform_events/sforce_api_objects_lightningurieventstream.htm
retention:
  duration: 6 Months
  comments: N/A
latency:
  duration: Real-Time
  comments: N/A
licensing:
  comments: Requires Salesforce Shield or a Salesforce Event Monitoring add-on subscription.
mappings:
  - category: activity_audit
    event_type: create_resource
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: Operation
      username: Username
      user_id: UserId
      user_type_or_role: UserType
      session_id: SessionKey
      ip_address: SourceIp
      device_client_type: DevicePlatform
      resource_name: PageUrl
      resource_type: QueriedEntities
    examples:
      - type: create
        location: ./event_examples/salesforce_rtem_lightningurieventstream/activity_audit_create_resource_lightningurieventstream.json
  - category: activity_audit
    event_type: read_resource
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: Operation
      username: Username
      user_id: UserId
      user_type_or_role: UserType
      session_id: SessionKey
      ip_address: SourceIp
      device_client_type: DevicePlatform
      resource_name: PageUrl
      resource_type: QueriedEntities
    examples:
      - type: read
        location: ./event_examples/salesforce_rtem_lightningurieventstream/activity_audit_read_resource_lightningurieventstream.json
  - category: activity_audit
    event_type: update_resource
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: Operation
      username: Username
      user_id: UserId
      user_type_or_role: UserType
      session_id: SessionKey
      ip_address: SourceIp
      device_client_type: DevicePlatform
      resource_name: PageUrl
      resource_type: QueriedEntities
    examples:
      - type: update
        location: ./event_examples/salesforce_rtem_lightningurieventstream/activity_audit_update_resource_lightningurieventstream.json
  - category: activity_audit
    event_type: delete_resource
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: Operation
      username: Username
      user_id: UserId
      user_type_or_role: UserType
      session_id: SessionKey
      ip_address: SourceIp
      device_client_type: DevicePlatform
      resource_name: PageUrl
      resource_type: QueriedEntities
    examples:
      - type: delete
        location: ./event_examples/salesforce_rtem_lightningurieventstream/activity_audit_delete_resource_lightningurieventstream.json
