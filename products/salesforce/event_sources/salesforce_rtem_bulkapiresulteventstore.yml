entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources: [streaming_api]
name: Real-Time Event Monitoring BulkApiResultEventStore
description: Tracks when a user downloads the results of a Bulk API request.
references:
  - id: bulk_api_result_event_store
    name: BulkApiResultEventStore
    url: https://developer.salesforce.com/docs/atlas.en-us.platform_events.meta/platform_events/sforce_api_objects_bulkapiresulteventstore.htm
retention:
  duration: 6 Months
  comments: N/A
latency:
  duration: Real-Time
  comments: N/A
licensing:
  comments: Requires Salesforce Shield or a Salesforce Event Monitoring add-on subscription.
mappings:
  - category: activity_audit
    event_type: create_resource
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: data.payload.attributes.type
      result: PolicyOutcome
      username: Username
      user_id: UserId
      session_id: SessionKey
      ip_address: SourceIp
      resource_name: Query
    examples:
      - type: download
        location: ./event_examples/salesforce_rtem_bulkapiresulteventstore/activity_audit_download_resource_bulkapiresulteventstore.json
