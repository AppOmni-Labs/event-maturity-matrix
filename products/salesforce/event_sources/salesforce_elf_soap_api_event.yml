        location: ./event_examples/salesforce_elf_soap_api_event/activity_audit_read_resource_soapapi.json
  - category: activity_audit
    event_type: update_resource
    attributes:
      timestamp: TIMESTAMP_DERIVED
      event_code_or_type: EVENT_TYPE
      result: REQUEST_STATUS
      user_id: USER_ID
      user_type_or_role: USER_TYPE
      session_id: SESSION_KEY
      ip_address: CLIENT_IP
      device_client_type: API_TYPE
      resource_type: ENTITY_NAME
