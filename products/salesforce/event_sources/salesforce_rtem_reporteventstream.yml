entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources: [streaming_api]
name: Real-Time Event Monitoring ReportEventStream
description: Tracks report-related actions, such as when a user runs or exports a
  report.
references:
  - id: report_event_stream
    name: ReportEventStream
    url: https://developer.salesforce.com/docs/atlas.en-us.platform_events.meta/platform_events/sforce_api_objects_reporteventstream.htm
retention:
  duration: 6 Months
  comments: N/A
latency:
  duration: Real-Time
  comments: N/A
licensing:
  comments: Requires Salesforce Shield or a Salesforce Event Monitoring add-on subscription.
mappings:
  - category: activity_audit
    event_type: read_resource
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: Operation
      result: PolicyOutcome
      username: Username
      user_id: UserId
      session_id: SessionKey
      ip_address: SourceIp
      device_client_type: EventSource
      resource_name: Name
      resource_type: QueriedEntities
    examples:
      - type: read
        location: ./event_examples/salesforce_rtem_reporteventstream/activity_audit_read_resource_reporteventstream.json
  - category: activity_audit
    event_type: download_resource
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: Operation
      result: PolicyOutcome
      username: Username
      user_id: UserId
      session_id: SessionKey
      ip_address: SourceIp
      device_client_type: EventSource
      resource_metadata: RowsProcessed
      resource_name: Name
      resource_type: QueriedEntities
    examples:
      - type: download
        location: ./event_examples/salesforce_rtem_reporteventstream/activity_audit_download_resource_reporteventstream.json
