entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources:
  - streaming_api
name: Real-Time Event Monitoring LogoutEventStream
description: A logout event records a successful user logout from the Salesforce user interface.
references:
- id: logout_event_stream
  name: LogoutEventStream
  url: https://developer.salesforce.com/docs/atlas.en-us.platform_events.meta/platform_events/sforce_api_objects_logouteventstream.htm
retention:
  duration: 6 Months
  comments: N/A
latency:
  duration: Real-Time
  comments: N/A
licensing:
  comments: Requires Salesforce Shield or a Salesforce Event Monitoring add-on subscription.
mappings:
- category: authentication
  event_type: account_logout
  attributes:
    timestamp: EventDate
    event_id: EventIdentifier
    event_code_or_type: data.payload.attributes.type
    username: Username
    user_id: UserId
    session_id: SessionKey
    ip_address: SourceIp
  examples:
  - type: success
    location: ./event_examples/salesforce_rtem_logouteventstream/authentication_account_logout.json
