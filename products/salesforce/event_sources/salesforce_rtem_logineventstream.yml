entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources: [streaming_api]
name: Real-Time Event Monitoring LoginEventStream
description: Tracks login activity of users who log in to Salesforce.
references:
  - id: login_event_stream
    name: LoginEventStream
    url: https://developer.salesforce.com/docs/atlas.en-us.platform_events.meta/platform_events/sforce_api_objects_logineventstream.htm
retention:
  duration: 10 Years
  comments: N/A
latency:
  duration: Real-Time
  comments: N/A
licensing:
  comments: Requires Salesforce Shield or a Salesforce Event Monitoring add-on subscription.
mappings:
  - category: authentication
    event_type: account_login
    attributes:
      timestamp: EventDate
      event_id: EventIdentifier
      event_code_or_type: data.payload.attributes.type
      result: Status
      username: Username
      user_id: UserId
      user_type_or_role: UserType
      session_id: LoginKey
      ip_address: SourceIp
      ip_geolocation_or_asn: City
      user_agent_name: Browser
      device_client_type: Platform
      failure_context: Status
      credential_context: LoginType
      identity_service_provider_context: AuthServiceId
    examples:
      - type: success
        location: ./event_examples/salesforce_rtem_logineventstream/authentication_account_login.json
      - type: failure
        location: ./event_examples/salesforce_rtem_logineventstream/authentication_account_login_failure.json
