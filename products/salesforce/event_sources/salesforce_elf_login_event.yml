entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources: [rest_api, soap_api]
name: EventLogFile Login Event
description: This event source is to track login events in Salesforce.
references:
  - id: login_event
    name: EventLogFile Login Event
    url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_eventlogfile_login.htm
retention:
  duration: 1 Day
  comments: Available for free with 1 day retention, otherwise requires an add-on
    subscription for 30 day retention.
latency:
  duration: 3 Hours
  comments: Event log files are accessible via hourly and 24 hour log files. It can
    take between 3–6 hours from the time of the event to be available in the hourly
    log file.
licensing:
  comments: Available for free with 1 day retention, otherwise requires Salesforce
    Shield or a Salesforce Event Monitoring add-on subscription.
mappings:
  - category: authentication
    event_type: account_login
    attributes:
      timestamp: TIMESTAMP_DERIVED
      event_code_or_type: EVENT_TYPE
      result: LOGIN_STATUS
      username: USER_NAME
      user_id: USER_ID
      user_type_or_role: USER_TYPE
      session_id: LOGIN_KEY
      ip_address: SOURCE_IP
      user_agent_name: BROWSER_TYPE
      failure_context: LOGIN_STATUS
      credential_context: LOGIN_TYPE
      identity_service_provider_context: AUTHENTICATION_METHOD_REFERENCE
    examples:
      - type: success
        location: ./event_examples/salesforce_elf_login_event/authentication_account_login_elf.json
