entity_name: event_source
version: 1.0.0
product:
  name: Salesforce
  collection_sources: [rest_api, soap_api]
name: SetupAuditTrail
description: The SetupAuditTrail object provides an audit trail of changes to user
  profiles, permission sets, security settings, custom objects, and other settings.
references:
  - id: setup_audit_trail
    name: SetupAuditTrail
    url: https://developer.salesforce.com/docs/atlas.en-us.object_reference.meta/object_reference/sforce_api_objects_setupaudittrail.htm
retention:
  duration: 180 Days
  comments: N/A
latency:
  duration: Real-Time
  comments: N/A
licensing:
  comments: Free
mapping_defaults:
  source:
    attributes:
      timestamp: sfdc_created_date
      event_id: record_id
      event_code_or_type: action
      username: sfdc_created_by_username
      user_id: sfdc_created_by_id
