# License, v. 2.0. If a copy of the MPL was not distributed with this
# file, You can obtain one at https://mozilla.org/MPL/2.0/.
entity_name: event_source
version: 1.0.0
product:
  name: Slack
  collection_sources: [slack_audit_logs]
name: Enterprise Audit Logs
description: Slack enterprise audit logs that provide an audit trail of user and system
  activity.
references:
  - id: slack_audit_schema
    name: Slack Audit Log Event Schema
    url: https://api.slack.com/admins/audit-logs#audit-event
  - id: slack_audit_log_actions
    name: Slack Audit Log Actions
    url: https://api.slack.com/admins/audit-logs-call#actions
  - id: slack_audit_log_anomalies
    name: Slack Audit Log Anomaly Events
    url: https://api.slack.com/admins/audit-logs-anomaly
retention:
  duration: Default 90 days
  comments: Can be customized
latency:
  duration: Near real-time
  comments: NA
licensing:
  comments: The Audit Logs API is only available to Slack workspaces on an Enterprise
    Grid plan.
mapping_defaults:
  source:
    attributes:
      timestamp: date_create
      event_id: id
      event_code_or_type: action
      session_id: context.session_id
      ip_address: context.ip_address
      user_agent_name: context.ua
mappings:
  - category: authentication
    event_type: account_login
    attributes:
      username: entity.user.email
      user_id: entity.user.id
    examples:
      - type: success
        location: ./event_examples/authentication_account_login_success.json
      - type: failure
        location: ./event_examples/authentication_account_login_failure.json
  - category: authentication
    event_type: account_logout
    attributes:
      username: entity.user.email
      user_id: entity.user.id
    examples:
      - type: success
        location: ./event_examples/authentication_account_logout.json
  - category: authorization
    event_type: create_user
    attributes:
      username: actor.user.email
      user_id: entity.user.id
      target_username: entity.user.email
    examples:
      - type: member
        location: ./event_examples/authorization_create_user.json
      - type: guest
        location: ./event_examples/authorization_create_user_guest.json
  - category: authorization
    event_type: update_user
    attributes:
      username: actor.user.email
      user_id: entity.user.id
      target_username: entity.user.email
      target_attribute_context: details
    examples:
      - type: success
        location: ./event_examples/authorization_update_user.json
  - category: authorization
    event_type: delete_user
    attributes:
      username: actor.user.email
      user_id: entity.user.id
      target_username: entity.user.email
    examples:
      - type: success
        location: ./event_examples/authorization_delete_user.json
  - category: authorization
    event_type: add_to_group
    attributes:
      username: details.inviter.user.email
      user_id: details.inviter.user.id
      target_username: entity.usergroup.name
    examples:
      - type: success
        location: ./event_examples/authorization_add_to_group.json
  - category: authorization
    event_type: remove_from_group
    attributes:
      username: details.kicker.user.email
      user_id: details.kicker.user.id
      target_group_name: entity.usergroup.name
      target_username: actor.user.email
    examples:
      - type: success
        location: ./event_examples/authorization_remove_from_group.json
  - category: authorization
    event_type: create_role
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      target_role_name: entity.role.name
    examples:
      - type: success
        location: ./event_examples/authorization_create_role.json
  - category: authorization
    event_type: update_role
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      target_role_name: entity.role.name
    examples:
      - type: success
        location: ./event_examples/authorization_update_role.json
  - category: authorization
    event_type: delete_role
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      target_role_name: entity.role.name
    examples:
      - type: success
        location: ./event_examples/authorization_delete_role.json
  - category: authorization
    event_type: add_permission
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      permission_name: entity.role.name
      target_resource_name: details.target_user
    examples:
      - type: assign_role
        location: ./event_examples/authorization_add_permission_role_assigned.json
      - type: assign_admin
        location: ./event_examples/authorization_add_permission_role_changed_to_admin.json
  - category: authorization
    event_type: remove_permission
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      permission_name: details.changed_permissions
      target_resource_name: entity.account_type_role.name
    examples:
      - type: success
        location: ./event_examples/authorization_remove_permission.json
  - category: authorization
    event_type: add_enrollment
    attributes:
      username: actor.user.email
      user_id: actor.user.id
    examples:
      - type: success
        location: ./event_examples/authorization_add_enrollment.json
  - category: authorization
    event_type: remove_enrollment
    attributes:
      username: actor.user.email
      user_id: actor.user.id
    examples:
      - type: success
        location: ./event_examples/authorization_remove_enrollment.json
  - category: system_audit
    event_type: create_security_configuration
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      configuration_setting_name: action
      configuration_setting_value: details
    examples:
      - type: success
        location: ./event_examples/system_audit_create_security_configuration.json
  - category: system_audit
    event_type: update_security_configuration
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      configuration_setting_name: action
      configuration_setting_value: details.new_value
      previous_configuration_setting_value: details.previous_value
    examples:
      - type: change_sso
        location: ./event_examples/system_audit_update_security_configuration_sso_changed.json
      - type: unapproved_ip
        location: ./event_examples/system_audit_update_security_configuration_unapproved_ip.json
  - category: system_audit
    event_type: delete_security_configuration
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      configuration_setting_name: action
      configuration_setting_value: details
    examples:
      - type: success
        location: ./event_examples/system_audit_delete_security_configuration.json
  - category: system_audit
    event_type: create_integration
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      integration_app_name: entity.app.name
    examples:
      - type: success
        location: ./event_examples/system_audit_create_integration.json
  - category: system_audit
    event_type: update_integration
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      integration_app_name: entity.app.name
      previous_configuration_setting_value: details.previous_scopes
    examples:
      - type: success
        location: ./event_examples/system_audit_update_integration.json
  - category: system_audit
    event_type: delete_integration
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      integration_app_name: entity.app.name
    examples:
      - type: success
        location: ./event_examples/system_audit_delete_integration.json
  - category: activity_audit
    event_type: create_resource
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      resource_name: entity.file.name
      resource_type: action
    examples:
      - type: success
        location: ./event_examples/activity_audit_create_resource.json
  - category: activity_audit
    event_type: update_resource
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      resource_name: entity.channel.name
      resource_type: entity.type
    examples:
      - type: success
        location: ./event_examples/activity_audit_update_resource.json
  - category: activity_audit
    event_type: delete_resource
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      resource_name: entity.file.name
      resource_type: entity.type
    examples:
      - type: success
        location: ./event_examples/activity_audit_delete_resource.json
  - category: activity_audit
    event_type: download_resource
    attributes:
      username: actor.user.email
      user_id: actor.user.id
      resource_name: entity.file.name
      resource_type: entity.type
    examples:
      - type: success
        location: ./event_examples/activity_audit_download_resource.json
