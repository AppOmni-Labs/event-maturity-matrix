entity_name: event_source
version: 1.0.0
product:
  name: Okta
  collection_sources: [system_log_api]
name: System Log API
description: The Okta System Log API provides near real-time, read-only access to
  an organization's system log.
references:
  - id: system_log_api_documentation
    name: System Log API Event Schema and Documentation
    url: https://developer.okta.com/docs/reference/api/system-log/
  - id: system_log_api_event_types
    name: System Log API Event Types
    url: https://developer.okta.com/docs/reference/api/event-types/
retention:
  duration: System Log events are retained in Okta for a period of 90 days.
  comments: https://support.okta.com/help/s/article/Customer-Data-Retention-Policy?language=en_US
latency:
  duration: Near real-time
  comments: N/A
licensing:
  comments: A paid Okta license is required to access the System Log API.
mapping_defaults:
  source:
    attributes:
      timestamp: published
      event_id: uuid
      event_code_or_type: eventType
      username: actor.alternateId
      user_id: actor.id
      session_id: authenticationContext.externalSessionId
      ip_address: client.ipAddress
      ip_geolocation_or_asn: client.geographicalContext
      user_agent_name: client.userAgent
      device_client_type: client.device
      result: outcome.result
mappings:
  - category: authentication
    event_type: account_login
    attributes:
      result:
      failure_context: outcome.reason
      credential_context: authenticationContext.credentialType
      identity_service_provider_context: authenticationContext.authenticationProvider
    examples:
      - type: success
        location: ./event_examples/authentication_account_login_session_success.json
      - type: failure
        location: ./event_examples/authentication_account_login_session_failure.json
  - category: authentication
    event_type: account_logout
    attributes: {}
    examples:
      - type: success
        location: ./event_examples/authentication_account_logout.json
  - category: authentication
    event_type: mfa_verification
    attributes:
      verification_method: debugContext.debugData.factor
      verification_flagged: debugContext.debugData
    examples:
      - type: success
        location: ./event_examples/authentication_mfa_verification.json
      - type: flagged
        location: ./event_examples/authentication_mfa_verification_flagged.json
  - category: authorization
    event_type: create_user
    attributes:
      target_username: target.alternateId
    examples:
      - type: success
        location: ./event_examples/authorization_create_user.json
  - category: authorization
    event_type: update_user
    attributes:
      target_username: target.alternateId
      target_attribute_context: debugContext.debugData.changedAttributes
    examples:
      - type: success
        location: ./event_examples/authorization_update_user.json
  - category: authorization
    event_type: delete_user
    attributes:
      target_username: target.alternateId
    examples:
      - type: success
        location: ./event_examples/authorization_delete_user.json
  - category: authorization
    event_type: create_group
    attributes:
      target_group_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_create_group.json
  - category: authorization
    event_type: update_group
    attributes:
      target_group_name: target.displayName
      target_attribute_context: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_update_group.json
  - category: authorization
    event_type: delete_group
    attributes:
      target_group_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_delete_group.json
  - category: authorization
    event_type: add_to_group
    attributes:
      target_group_name: target.displayName
      target_username: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_add_to_group.json
  - category: authorization
    event_type: remove_from_group
    attributes:
      target_group_name: target.displayName
      target_username: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_remove_from_group.json
  - category: authorization
    event_type: create_role
    attributes:
      target_role_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_create_role.json
  - category: authorization
    event_type: update_role
    attributes:
      target_role_name: target.displayName
      target_attribute_context: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_update_role.json
  - category: authorization
    event_type: delete_role
    attributes:
      target_role_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/authorization_delete_role.json
  - category: authorization
    event_type: add_permission
    attributes:
      permission_name: debugContext.debugData.privilegeGranted
      target_resource_name: target.alternateId
    examples:
      - type: success
        location: ./event_examples/authorization_add_permission.json
  - category: authorization
    event_type: remove_permission
    attributes:
      permission_name: debugContext.debugData.privilegeRevoked
      target_resource_name: target.alternateId
    examples:
      - type: success
        location: ./event_examples/authorization_remove_permission.json
  - category: authorization
    event_type: add_enrollment
    attributes:
      enrollment_type: outcome.reason
      target_username: target.alternateId
    examples:
      - type: success
        location: ./event_examples/authorization_add_enrollment.json
  - category: authorization
    event_type: remove_enrollment
    attributes:
      enrollment_type: outcome.reason
      target_username: target.alternateId
    examples:
      - type: success
        location: ./event_examples/authorization_remove_enrollment.json
  - category: system_audit
    event_type: create_security_configuration
    attributes:
      configuration_setting_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/system_audit_create_security_configuration_idp.json
  - category: system_audit
    event_type: update_security_configuration
    attributes:
      configuration_setting_name: target.displayName
      configuration_setting_value: debugContext.debugData.zoneData
    examples:
      - type: success
        location: ./event_examples/system_audit_update_security_configuration_zone.json
  - category: system_audit
    event_type: delete_security_configuration
    attributes:
      configuration_setting_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/system_audit_delete_security_configuration_behavior.json
  - category: system_audit
    event_type: create_integration
    attributes:
      integration_app_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/system_audit_create_integration.json
  - category: system_audit
    event_type: update_integration
    attributes:
      integration_app_name: target.displayName
      configuration_setting_name: debugContext.debugData.newSignonModeType
      previous_configuration_setting_value: debugContext.debugData.oldSignonModeType
    examples:
      - type: success
        location: ./event_examples/system_audit_update_integration.json
  - category: system_audit
    event_type: delete_integration
    attributes:
      integration_app_name: target.displayName
    examples:
      - type: success
        location: ./event_examples/system_audit_delete_integration.json
  - category: activity_audit
    event_type: create_resource
    attributes:
      resource_name: target.displayName
      resource_type: target.type
    examples:
      - type: success
        location: ./event_examples/activity_audit_create_resource.json
  - category: activity_audit
    event_type: update_resource
    attributes:
      resource_name: target.displayName
      resource_type: target.type
    examples:
      - type: success
        location: ./event_examples/activity_audit_update_resource.json
  - category: activity_audit
    event_type: delete_resource
    attributes:
      resource_name: target.displayName
      resource_type: target.type
    examples:
      - type: success
        location: ./event_examples/activity_audit_delete_resource.json
  - category: activity_audit
    event_type: download_resource
    attributes:
      resource_name: target.displayName
      resource_type: target.type
    examples:
      - type: success
        location: ./event_examples/activity_audit_download_resource.json
