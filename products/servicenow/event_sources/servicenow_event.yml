    location: ./event_examples/event/authorization_remove_from_group.json
- category: authorization
  event_type: update_role
  attributes:
    user_type_or_role: parm2
  examples:
  - type: update
    location: ./event_examples/event/authorization_update_role.json
- category: activity_audit
