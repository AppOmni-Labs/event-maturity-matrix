entity_name: event_source
version: 0.0.1
product:
  name: ServiceNow
  collection_sources:
  - event
name: System Events
description: ServiceNow system events are generated by pre-defined scripted triggers when users perform actions in the system.
references:
- id: event_logs_schema
  name: Event Logs Schema
  url: https://docs.servicenow.com/bundle/washingtondc-platform-administration/page/administer/platform-events/reference/r_EventLogs.html
retention:
  duration: Infinite
  comments: Can be changed by an instance admin.
latency:
  duration: Near Real-Time
  comments: Can vary based on system conditions and configurations.
licensing:
  comments: Included with ServiceNow instances.
mapping_defaults:
  source:
    attributes:
      timestamp: sys_created_on
      event_code_or_type: name
  categories:
    authentication:
      attributes:
        username: user_name
        user_id: user_id
        ip_address: parm2
    authorization:
      attributes:
        username: user_name
        user_id: user_id
    activity_audit:
      attributes:
        username: user_name
        user_id: user_id
        resource_name: table
mappings:
- category: authentication
  event_type: account_login
  attributes: {}
  examples:
  - type: login
    location: ./event_examples/event/authentication_account_login.json
- category: authentication
  event_type: account_logout
  attributes: {}
  examples:
  - type: logout
    location: ./event_examples/event/authentication_account_logout.json
- category: authorization
  event_type: create_user
  attributes: {}
  examples:
  - type: create
    location: ./event_examples/event/authorization_create_user.json
- category: authorization
  event_type: read_user
  attributes: {}
  examples:
  - type: read
    location: ./event_examples/event/authorization_read_user.json
- category: authorization
  event_type: delete_user
  attributes: {}
  examples:
  - type: delete
    location: ./event_examples/event/authorization_delete_user.json
- category: authorization
  event_type: update_group
  attributes: {}
  examples:
  - type: update
    location: ./event_examples/event/authorization_update_group.json
- category: authorization
  event_type: delete_group
  attributes: {}
  examples:
  - type: delete
    location: ./event_examples/event/authorization_delete_group.json
- category: authorization
  event_type: add_to_group
  attributes: {}
  examples:
  - type: add
    location: ./event_examples/event/authorization_add_to_group.json
- category: authorization
  event_type: remove_from_group
  attributes: {}
  examples:
