entity_name: event_source
version: 0.0.1
product:
  name: Veeva Vault
  collection_sources:
  - get_audittrail_api
name: Retrieve Audit Details API
description: The Veeva Vault Retrieve Audit Details API provides near real-time, read-only access to an organization's audit
  log.
references:
- id: get_audittrail_api_documentation
  name: Retrieve Audit Details API Documentation
  url: https://developer.veevavault.com/api/24.1/#retrieve-audit-details
retention:
  duration: 30 days
  comments: N/A
latency:
  duration: Near real-time
  comments: N/A
licensing:
  comments: A Veeva Vault license is required to access the Retrieve Audit Details API.
mappings:
- category: authentication
  event_type: account_login
  attributes:
    timestamp: timestamp
    event_id: id
    event_code_or_type: type
    username: user_name
    ip_address: source_ip
    user_agent_name: platform
    failure_context: status
  examples:
  - type: success
    location: ./event_examples/authentication_account_login_session_success.json
  - type: failure
    location: ./event_examples/authentication_account_login_session_failure.json
- category: authentication
  event_type: account_logout
