description: This Account Usage view can be used to query Snowflake query history
  by various dimensions (time range, session, user, warehouse, etc.) within the last
  365 days (1 year).
entity_name: event_source
latency:
  duration: Up to 45 minutes
  comments: N/A
licensing:
  comments: Contact sales
mapping_defaults:
  source:
    attributes:
      timestamp: START_TIME
      event_id: QUERY_ID
      event_code_or_type: QUERY_TYPE
      result: ERROR_CODE
      username: USER_NAME
      user_type_or_role: ROLE_NAME
      session_id: SESSION_ID
mappings:
  - category: authorization
    event_type: create_user
    attributes:
      target_username: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_create_user.json
        type: success
  - category: authorization
    event_type: read_user
    attributes:
      target_username: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_read_user.json
        type: success
  - category: authorization
    event_type: update_user
    attributes:
      target_username: QUERY_TEXT
      target_attribute_context: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_update_user.json
        type: success
  - category: authorization
    event_type: delete_user
    attributes: {}
    examples:
      - location: ./event_examples/query_history/authorization_delete_user.json
        type: success
  - category: authorization
    event_type: create_role
    attributes:
      target_role_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_create_role.json
        type: success
  - category: authorization
    event_type: read_role
    attributes:
      target_role_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_read_role.json
        type: success
  - category: authorization
    event_type: update_role
    attributes:
      target_attribute_context: QUERY_TEXT
      target_role_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_update_role.json
        type: success
  - category: authorization
    event_type: delete_role
    attributes:
      target_role_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_delete_role.json
        type: success
  - category: authorization
    event_type: add_permission
    attributes:
      permission_name: QUERY_TEXT
      target_resource_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_add_permission.json
        type: success
  - category: authorization
    event_type: remove_permission
    attributes:
      permission_name: QUERY_TEXT
      target_resource_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_remove_permission.json
        type: success
  - category: authorization
    event_type: remove_enrollment
    attributes:
      target_username: QUERY_TEXT
      enrollment_type: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/authorization_remove_enrollment.json
        type: success
  - category: system_audit
    event_type: create_security_configuration
    attributes:
      configuration_setting_name: QUERY_TEXT
      configuration_setting_value: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_create_security_configuration.json
        type: success
  - category: system_audit
    event_type: read_security_configuration
    attributes:
      configuration_setting_value: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_read_security_configuration.json
        type: success
  - category: system_audit
    event_type: update_security_configuration
    attributes:
      configuration_setting_name: QUERY_TEXT
      configuration_setting_value: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_update_security_configuration.json
        type: success
  - category: system_audit
    event_type: delete_security_configuration
    attributes:
      configuration_setting_name: QUERY_TEXT
      configuration_setting_value: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_delete_security_configuration.json
        type: success
  - category: system_audit
    event_type: create_integration
    attributes:
      integration_app_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_create_integration.json
        type: success
  - category: system_audit
    event_type: read_integration
    attributes:
      integration_app_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_read_integration.json
        type: success
  - category: system_audit
    event_type: update_integration
    attributes:
      configuration_setting_name: QUERY_TEXT
      integration_app_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_update_integration.json
        type: success
  - category: system_audit
    event_type: delete_integration
    attributes:
      integration_app_name: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/system_audit_delete_integration.json
        type: success
  - category: activity_audit
    event_type: create_resource
    attributes:
      resource_name: QUERY_TEXT
      resource_type: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/activity_audit_create_resource.json
        type: success
  - category: activity_audit
    event_type: read_resource
    attributes:
      resource_name: QUERY_TEXT
      resource_type: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/activity_audit_read_resource.json
        type: success
  - category: activity_audit
    event_type: update_resource
    attributes:
      resource_name: QUERY_TEXT
      resource_type: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/activity_audit_update_resource.json
        type: success
  - category: activity_audit
    event_type: delete_resource
    attributes:
      resource_name: QUERY_TEXT
      resource_type: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/activity_audit_delete_resource.json
        type: success
  - category: activity_audit
    event_type: download_resource
    attributes:
      resource_name: QUERY_TEXT
      resource_type: QUERY_TEXT
      resource_metadata: QUERY_TEXT
    examples:
      - location: ./event_examples/query_history/activity_audit_download_resource.json
        type: success
name: Query History
product:
  collection_sources: [query_history]
  name: Snowflake
references:
  - id: about_query_history
    name: About the Query History View
    url: https://docs.snowflake.com/en/sql-reference/account-usage/query_history
retention:
  duration: 365 days
  comments: N/A
version: 1.0.0
