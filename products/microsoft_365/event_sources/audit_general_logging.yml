entity_name: event_source
version: 1.0.0
product:
  name: Microsoft 365
  collection_sources:
  - m365_mgmt_api
name: General Audit Logs
description: Includes workloads not included in other audit log types.
references:
- id: audit_general_schema
  name: Common Audit Schema
  url: https://learn.microsoft.com/en-us/office/office-365-management-api/office-365-management-activity-api-schema#common-schema
retention:
  duration: 180 days
  comments: Minimum retention is 180 days, but organizations can set a retention policy up to 10 years dependent on licensing,
    reference https://learn.microsoft.com/en-us/purview/audit-log-retention-policies
latency:
  duration: Typically 60 to 90 minutes after an event occurs.
  comments: Microsoft does not provide a specific audit logging latency SLA, reference https://learn.microsoft.com/en-us/purview/audit-search?view=o365-worldwide&tabs=microsoft-purview-portal
licensing:
  comments: Standard and Premium audit licenses are available, with log availability and retention dependent on the license
    level. For more information, see https://learn.microsoft.com/en-us/purview/audit-search?view=o365-worldwide&tabs=microsoft-purview-portal
mapping_defaults:
  source:
    attributes:
      timestamp: CreationTime
      event_id: Id
      event_code_or_type: Operation
  categories:
    authorization:
      attributes:
        username: UserId
        user_id: UserKey
        target_group_name: TeamName
    system_audit:
      attributes:
        username: UserId
        user_id: UserKey
    activity_audit:
      attributes:
        username: UserId
        user_id: UserKey
mappings:
- category: authorization
  event_type: create_group
  attributes:
    username: null
    user_type_or_role: UserId
  examples:
  - type: success
    location: ./event_examples/general/authorization_create_group.json
- category: authorization
  event_type: update_group
  attributes:
    target_attribute_context: NewValue
  examples:
  - type: success
    location: ./event_examples/general/authorization_update_group.json
- category: authorization
  event_type: delete_group
  attributes: {}
  examples:
  - type: success
    location: ./event_examples/general/authorization_delete_group.json
- category: authorization
  event_type: add_to_group
  attributes:
    target_username: Members.DisplayName
  examples:
  - type: success
    location: ./event_examples/general/authorization_add_member_to_group.json
- category: authorization
  event_type: remove_from_group
  attributes:
    target_username: Members.DisplayName
  examples:
  - type: success
    location: ./event_examples/general/authorization_remove_member_from_group.json
- category: system_audit
  event_type: create_integration
  attributes:
    integration_app_name: AddOnName
  examples:
  - type: success
    location: ./event_examples/general/system_audit_create_integration.json
- category: system_audit
  event_type: delete_integration
  attributes: {}
  examples:
  - type: success
    location: ./event_examples/general/system_audit_delete_integration.json
- category: activity_audit
  event_type: create_resource
  attributes:
    resource_type: ExtraProperties
  examples:
  - type: success
    location: ./event_examples/general/activity_audit_create_resource.json
- category: activity_audit
  event_type: delete_resource
  attributes:
    ip_address: ClientIP
  examples:
  - type: success
    location: ./event_examples/general/activity_audit_delete_resource.json
