entity_name: event_source
version: 1.0.0
product:
  name: Microsoft 365
  collection_sources:
  - m365_mgmt_api
name: Azure Active Directory Audit Logs
description: Includes logs from Azure Active Directory including authentication and user management.
references:
- id: audit_azure_ad_schema
  name: Azure Active Directory Base Schema
  url: https://learn.microsoft.com/en-us/office/office-365-management-api/office-365-management-activity-api-schema#azure-active-directory-base-schema
retention:
  duration: 180 days
  comments: Minimum retention is 180 days, but organizations can set a retention policy up to 10 years dependent on licensing,
    reference https://learn.microsoft.com/en-us/purview/audit-log-retention-policies
latency:
  duration: Typically 60 to 90 minutes after an event occurs.
  comments: Microsoft does not provide a specific audit logging latency SLA, reference https://learn.microsoft.com/en-us/purview/audit-search?view=o365-worldwide&tabs=microsoft-purview-portal
licensing:
  comments: Standard and Premium audit licenses are available, with log availability and retention dependent on the license
    level. For more information, see https://learn.microsoft.com/en-us/purview/audit-search?view=o365-worldwide&tabs=microsoft-purview-portal
mapping_defaults:
  source:
    attributes:
      timestamp: CreationTime
      event_id: Id
      event_code_or_type: Operation
  categories:
    authentication:
      attributes:
        username: UserId
        user_id: UserKey
        user_type_or_role: Actor[].Type
        ip_address: ClientIP
        user_agent_name: ExtendedProperties[Name=UserAgent].Value
        device_client_type: DeviceProperties
    authorization:
      attributes:
        result: ResultStatus
        username: UserId
        user_id: UserKey
        user_type_or_role:
        - Actor[ID=User].Type
        - Actor[ID=ServicePrincipal].Type
    system_audit:
      attributes:
        result: ResultStatus
        username: UserId
        user_id: UserKey
        user_type_or_role:
        - Actor[ID=User].Type
        - Actor[ID=ServicePrincipal].Type
mappings:
- category: authentication
  event_type: account_login
  attributes:
    session_id: DeviceProperties[Name=SessionId].Value
    identity_service_provider_context: ExtendedProperties[Name=RequestType].Value
  examples:
  - type: success
    location: ./event_examples/azure_ad/authentication_account_login_success.json
  - type: failure
    location: ./event_examples/azure_ad/authentication_account_login_failure.json
- category: authentication
  event_type: mfa_verification
  attributes:
    result: ResultStatus
  examples:
  - type: success
    location: ./event_examples/azure_ad/authentication_mfa_verification.json
- category: authorization
  event_type: create_user
  attributes:
    target_username: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_create_user.json
- category: authorization
  event_type: update_user
  attributes:
    target_username: Target.ID
    target_attribute_context: ModifiedProperties
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_update_user.json
- category: authorization
  event_type: delete_user
  attributes:
    target_username: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_delete_user.json
- category: authorization
  event_type: create_group
  attributes:
    target_group_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_create_group.json
- category: authorization
  event_type: update_group
  attributes:
    target_group_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_update_group.json
- category: authorization
  event_type: delete_group
  attributes:
    target_group_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_delete_group.json
- category: authorization
  event_type: add_to_group
  attributes:
    device_client_type: ExtendedProperties[Name=additionalDetails].Value
    target_group_name: ModifiedProperties[Name=Group.DisplayName].NewValue
    target_username: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_add_member_to_group.json
- category: authorization
  event_type: remove_from_group
  attributes:
    user_agent_name: ExtendedProperties[Name=additionalDetails].Value
    target_group_name: ModifiedProperties[Name=Group.DisplayName].NewValue
    target_username: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_remove_member_from_group.json
- category: authorization
  event_type: create_role
  attributes:
    user_agent_name: ExtendedProperties[Name=additionalDetails].Value
    target_role_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_create_role.json
- category: authorization
  event_type: update_role
  attributes:
    user_agent_name: ExtendedProperties[Name=additionalDetails].Value
    target_role_name: Target.ID
    target_attribute_context: ModifiedProperties[Name=GrantedPermissions].NewValue
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_update_role.json
- category: authorization
  event_type: delete_role
  attributes:
    user_agent_name: ExtendedProperties[Name=additionalDetails].Value
    target_role_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_delete_role.json
- category: authorization
  event_type: add_permission
  attributes:
    permission_name: ModifiedProperties[Name=Role.DisplayName].NewValue
    target_resource_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_add_permission.json
- category: authorization
  event_type: remove_permission
  attributes:
    permission_name: ModifiedProperties[Name=Role.DisplayName].OldValue
    target_resource_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_remove_permission.json
- category: authorization
  event_type: add_enrollment
  attributes:
    enrollment_type: ModifiedProperties[Name=StrongAuthenticationUserDetails].NewValue
    target_username: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_add_enrollment.json
- category: authorization
  event_type: remove_enrollment
  attributes:
    enrollment_type: ModifiedProperties[Name=StrongAuthenticationPhoneAppDetail].OldValue
    target_username: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/authorization_remove_enrollment.json
- category: system_audit
  event_type: create_security_configuration
  attributes:
    user_agent_name: ExtendedProperties[Name=additionalDetails].Value
    configuration_setting_name: ModifiedProperties[Name=PolicyType].NewValue
    configuration_setting_value: ModifiedProperties
  examples:
  - type: success
    location: ./event_examples/azure_ad/system_audit_create_security_configuration_cap.json
- category: system_audit
  event_type: update_security_configuration
  attributes:
    user_agent_name: ExtendedProperties[Name=additionalDetails].Value
    configuration_setting_name: ExtendedProperties[Name=extendedAuditEventCategory].Value
    configuration_setting_value: ModifiedProperties[Name=Included Updated Properties].NewValue
    previous_configuration_setting_value: ModifiedProperties
  examples:
  - type: success
    location: ./event_examples/azure_ad/system_audit_update_security_configuration_cap.json
- category: system_audit
  event_type: delete_security_configuration
  attributes:
    user_agent_name: ExtendedProperties[Name=additionalDetails].Value
    configuration_setting_name: ExtendedProperties[Name=extendedAuditEventCategory].Value
  examples:
  - type: success
    location: ./event_examples/azure_ad/system_audit_delete_security_configuration_cap.json
- category: system_audit
  event_type: create_integration
  attributes:
    integration_app_name: ModifiedProperties[Name=DisplayName].NewValue
  examples:
  - type: success
    location: ./event_examples/azure_ad/system_audit_create_integration.json
- category: system_audit
  event_type: update_integration
  attributes:
    integration_app_name: Target.ID
    configuration_setting_name: ModifiedProperties
    previous_configuration_setting_value: ModifiedProperties[Name=Entitlement].OldValue
  examples:
  - type: success
    location: ./event_examples/azure_ad/system_audit_update_integration.json
- category: system_audit
  event_type: delete_integration
  attributes:
    integration_app_name: Target.ID
  examples:
  - type: success
    location: ./event_examples/azure_ad/system_audit_delete_integration.json
