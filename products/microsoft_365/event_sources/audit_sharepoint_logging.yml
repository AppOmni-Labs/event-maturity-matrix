entity_name: event_source
version: 1.0.0
product:
  name: Microsoft 365
  collection_sources: [m365_mgmt_api]
name: Sharepoint Audit Logs
description: Includes logs for Sharepoint and OneDrive.
references:
  - id: audit_sharepoint_schema
    name: SharePoint Base Schema
    url: https://learn.microsoft.com/en-us/office/office-365-management-api/office-365-management-activity-api-schema#sharepoint-base-schema
retention:
  duration: 180 days
  comments: Minimum retention is 180 days, but organizations can set a retention policy
    up to 10 years dependent on licensing, reference https://learn.microsoft.com/en-us/purview/audit-log-retention-policies
latency:
  duration: Typically 60 to 90 minutes after an event occurs.
  comments: Microsoft does not provide a specific audit logging latency SLA, reference
    https://learn.microsoft.com/en-us/purview/audit-search?view=o365-worldwide&tabs=microsoft-purview-portal
licensing:
  comments: Standard and Premium audit licenses are available, with log availability
    and retention dependent on the license level. For more information, see https://learn.microsoft.com/en-us/purview/audit-search?view=o365-worldwide&tabs=microsoft-purview-portal
mapping_defaults:
  source:
    attributes:
      timestamp: CreationTime
      event_id: Id
      event_code_or_type: Operation
  categories:
    authentication:
      attributes:
        username: UserId
        session_id: AppAccessContext.AADSessionId
        ip_address: ClientIP
        user_agent_name: UserAgent
        device_client_type: Platform
    authorization:
      attributes:
        username: UserId
        session_id: AppAccessContext.AADSessionId
        ip_address: ClientIP
        user_agent_name: UserAgent
        device_client_type: Platform
    activity_audit:
      attributes:
        username: UserId
        session_id: AppAccessContext.AADSessionId
        ip_address: ClientIP
        user_agent_name: UserAgent
        device_client_type: Platform
mappings:
  - category: authentication
    event_type: account_login
    attributes: {}
    examples:
      - type: success
        location: ./event_examples/sharepoint/authentication_account_login.json
  - category: authorization
    event_type: add_to_group
    attributes:
      target_group_name: EventData
      target_username: TargetUserOrGroupName
    examples:
      - type: success
        location: ./event_examples/sharepoint/authorization_add_member_to_group.json
  - category: authorization
    event_type: remove_from_group
    attributes:
      target_group_name: EventData
      target_username: TargetUserOrGroupName
    examples:
      - type: success
        location: ./event_examples/sharepoint/authorization_remove_member_from_group.json
  - category: authorization
    event_type: add_permission
    attributes:
      permission_name: TargetUserOrGroupType
      target_resource_name: TargetUserOrGroupName
    examples:
      - type: success
        location: ./event_examples/sharepoint/authorization_add_permission.json
  - category: authorization
    event_type: remove_permission
    attributes:
      permission_name: TargetUserOrGroupType
      target_resource_name: TargetUserOrGroupName
    examples:
      - type: success
        location: ./event_examples/sharepoint/authorization_remove_permission.json
  - category: system_audit
    event_type: update_security_configuration
    attributes:
      username: UserId
      ip_address: ClientIP
      user_agent_name: UserAgent
      configuration_setting_name: ModifiedProperties
      configuration_setting_value: ModifiedProperties
      previous_configuration_setting_value: ModifiedProperties
    examples:
      - type: success
        location: ./event_examples/sharepoint/system_audit_update_security_configuration.json
  - category: activity_audit
    event_type: create_resource
    attributes:
      resource_name: EventData
      resource_type: ItemType
    examples:
      - type: success
        location: ./event_examples/sharepoint/activity_audit_create_resource_site.json
  - category: activity_audit
    event_type: read_resource
    attributes:
      resource_name: ObjectId
      resource_type: ItemType
    examples:
      - type: success
        location: ./event_examples/sharepoint/activity_audit_read_resource_page.json
  - category: activity_audit
    event_type: delete_resource
    attributes:
      session_id:
      device_client_type:
      resource_name: ObjectId
      resource_type: ItemType
    examples:
      - type: success
        location: ./event_examples/sharepoint/activity_audit_delete_resource_site.json
  - category: activity_audit
    event_type: download_resource
    attributes:
      resource_name: ItemType
    examples:
      - type: success
        location: ./event_examples/sharepoint/activity_audit_download_resource_file.json
  - category: activity_audit
    event_type: query_resource
    attributes:
      session_id:
      user_agent_name:
      device_client_type:
      user_id: UserKey
      user_type_or_role: UserType
      resource_name: QuerySource
      query_string: QueryText
    examples:
      - type: success
        location: ./event_examples/sharepoint/activity_audit_query_resource.json
