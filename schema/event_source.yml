$id: https://json-schema.org/draft/2020-12/schema
title: Event Maturity Matrix - Event Source
description: |
  A schema that defines the structure of an event source in the event-maturity-matrix.
  Event sources are product specific definitions which define the categories, event types and attributes
  for that specific event source.
properties:
  entity_name:
    description: The entity type.
    type: string
    enum: ["event_source"]
  version:
    description: A semantic version of the defined document.
    type: string
  product:
    description: The name of the product / product.
    type: object
    properties:
      name:
        description: The name of the product.
        type: string
      collection_sources:
        description: References to collection IDs in the product definition.
        type: array
        items:
          type: string
    required:
      - name
  name:
    description: The name of the event source.
    type: string
  description:
    description: The description for the event source.
    type: string
  comments:
    description: A generic field which can contain comments or notes.
    type: string
  tags:
    description: One or more tags for this event source.
    type: array
    items:
      type: string
    uniqueItems: true
  retention:
    description: Defined retention periods for a given event source.
    $ref: "#/$defs/base"
  latency:
    description: Any observed or documented latency for an event source.
    $ref: "#/$defs/base"
  references:
    description: One or more collection references for this event source.
    type: array
    items:
      $ref: "#/$defs/reference"
    uniqueItems: true
  licensing:
    description: General licensing information if known.
    type: object
    properties:
      comments:
        description: General comments about licensing.
        type: string
    required:
      - comments
  mappings:
    description: A list of mappings for an event source. Mappings are in {category}.{event_type}.{attribute} order.
    type: array
    items:
      $ref: "#/$defs/mapping"
    uniqueItems: true
  mapping_defaults:
    description: |
      Optional layered defaults for attribute maps. Merge order per mapping is
      source.attributes → categories[category].attributes → mapping.attributes.
      YAML null on a key in mapping.attributes removes that attribute from the merged result.
    type: object
    additionalProperties: false
    properties:
      source:
        type: object
        additionalProperties: false
        properties:
          attributes:
            $ref: "#/$defs/attribute_map"
      categories:
        type: object
        propertyNames:
          pattern: "^[a-z][a-z0-9_]*$"
        additionalProperties:
          type: object
          additionalProperties: false
          properties:
            attributes:
              $ref: "#/$defs/attribute_map"
  meta:
    description: An object that contains meta information about the definition.
    type: ["null", "object"]
  examples:
    description: References one or more example files (relative path expected) containing a JSON response from the defined service.
    type: ["array", "null"] # This means it is NOT required.
    items:
      type: string
    uniqueItems: true
     # pattern: "file:file2.json"
additionalProperties: false
required:
  - entity_name
  - name
  - product
  - description
  - version
  - references
  - retention
  - latency
  - mappings
  # - examples
$defs:
  attribute_map:
    description: Attribute key to JSON field path(s); same shape as a resolved mapping.attributes.
    type: object
    minProperties: 0
    additionalProperties:
      oneOf:
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
  attribute_map_delta:
    description: Like attribute_map but YAML null removes an inherited key when merging defaults.
    type: object
    minProperties: 0
    additionalProperties:
      oneOf:
        - type: "null"
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
  base:
    type: object
    properties:
      duration:
        description: The retention duration.
        type: string
      comments:
        description: Comments about the retention.
        type: string
  mapping:
    type: object
    required:
      - category
      - event_type
      - attributes
    properties:
      category:
        description: The category key for this mapping (matches categories.yml items[].key).
        type: string
        pattern: "^[a-z][a-z0-9_]*$"
      event_type:
        description: The event type key for this mapping (matches event_types.yml items[].key).
        type: string
        pattern: "^[a-z][a-z0-9_]*$"
      attributes:
        unique: true
        description: |
          Delta on top of mapping_defaults. May be empty if defaults supply all paths.
          Use YAML null for a key to drop an inherited default for this event type.
        $ref: "#/$defs/attribute_map_delta"
      examples:
        type: array
        items:
          $ref: '#/$defs/example'
        uniqueItems: true
  example:
    type: object
    properties:
      type:
        description: The type of event example this references.
        type: string
      location:
        description: The location of an example event which is sanitized.
        type: string
  reference:
    type: object
    required:
      - id
      - name
      - url
    properties:
      id:
        description: A unique id for this reference.
        type: string
      name:
        description: A reference name.
        type: string
      url:
        description: A URL pointing to the reference.
        type: string
