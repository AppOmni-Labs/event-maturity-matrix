$id: https://json-schema.org/draft/2020-12/schema
title: Event Maturity Matrix - Event Types
description: A schema that defines the structure of event types in the event-maturity-matrix
properties:
  entity_name:
    description: The name of the entity itself.
    type: string
  description:
    description: The description for the entity types.
    type: string
  version:
    description: A semantic version of the defined document.
    type: string
  meta:
    description: An object that contains meta information about the definition.
    type: ["null", "object"]
  items:
    description: An array of event types.
    type: array
    items:
      $ref: "#/$defs/event_type"
    minItems: 1
    uniqueItems: true
additionalProperties: false
required:
  - entity_name
  - description
  - version
  - items
$defs:
  event_type:
    type: object
    required:
      - id
      - key
      - name
      - description
      - categories
    properties:
      id:
        description: Legacy stable ID (e.g. ET0001).
        type: string
      key:
        description: Stable snake_case key used in event source mappings.
        type: string
        pattern: "^[a-z][a-z0-9_]*$"
      name:
        description: Display name of the event type.
        type: string
      description:
        description: The description of the event type.
        type: string
      categories:
        description: Category keys (categories.yml items[].key) this event type belongs to.
        type: array
        items:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        uniqueItems: true
