$id: https://json-schema.org/draft/2020-12/schema
title: Event Maturity Matrix - Attributes
description: A schema that defines the structure of attributes in the event-maturity-matrix
properties:
  entity_name:
    description: The name of the entity itself.
    type: string
  description:
    description: The description for the attributes entity.
    type: string
  version:
    description: A semantic version of the defined document.
    type: string
  meta:
    description: An object that contains meta information about the definition.
    type: ["null", "object"]
  items:
    description: An array of attributes.
    type: array
    items:
      $ref: "#/$defs/attribute"
    minItems: 1
    uniqueItems: true
additionalProperties: false
required:
  - entity_name
  - description
  - version
  - items
$defs:
  attribute:
    type: object
    required:
      - id
      - key
      - name
      - type
      - description
    properties:
      id:
        description: Legacy stable ID (e.g. A0001).
        type: string
      key:
        description: Stable snake_case key used in event source mappings.
        type: string
        pattern: "^[a-z][a-z0-9_]*$"
      name:
        description: Display name of the attribute.
        type: string
      type:
        description: Defines the value type for the given attribute field.
        type: string
        enum:
          - string
          - array
          - integer
      description:
        description: The description of the attribute
        type: string
      examples:
        description: An example of the attribute being defined
        type: array
        unique: true
        items:
          type: ["string", "integer"]
      maturity:
        description: A maturity score.
        type: integer
      include:
        description: Event type keys (event_types.yml items[].key) this attribute applies to.
        type: array
        unique: true
        items:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
      exclude:
        description: Event type keys this field is excluded from.
        type: array
        unique: true
        items:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
